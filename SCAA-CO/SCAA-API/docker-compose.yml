services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: scaa-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  api:
    build:
      context: ..          # one level up — the Dockerfile expects SCAA-API/ as a sub-folder
      dockerfile: SCAA-API/Dockerfile
    container_name: scaa-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >-
        Server=sqlserver,1433;Database=SCAA_API;
        User Id=sa;Password=${SA_PASSWORD};
        MultipleActiveResultSets=true;TrustServerCertificate=true
      JwtOptions__Secret: "${JWT_SECRET}"
      JwtOptions__Issuer: scaa-api
      JwtOptions__Audience: scaa-client
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: on-failure

volumes:
  sqlserver_data:

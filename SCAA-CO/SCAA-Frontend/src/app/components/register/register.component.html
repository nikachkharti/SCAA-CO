<section class="auth-page">
  <div class="auth-card">
    <header>
      <h2>Create account</h2>
      <p class="subtitle">Register as an admin user.</p>
    </header>

    @if (error()) {
      <div class="alert error">{{ error() }}</div>
    }
    @if (success()) {
      <div class="alert success">{{ success() }}</div>
    }

    <form class="auth-form" (ngSubmit)="submit()" #f="ngForm">
      <label>
        <span>Email</span>
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          autocomplete="email"
          required
        />
      </label>

      <label>
        <span>Password</span>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          autocomplete="new-password"
          required
          minlength="6"
        />
      </label>

      <label>
        <span>Confirm password</span>
        <input
          type="password"
          name="confirmPassword"
          [(ngModel)]="confirmPassword"
          autocomplete="new-password"
          required
        />
      </label>

      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="submitting() || f.invalid"
      >
        @if (submitting()) { Creating account... } @else { Create account }
      </button>
    </form>

    <p class="auth-switch">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>
  </div>
</section>

services:

  ### SQL SERVER ###
  sqlserver:
    container_name: sqlserver
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always


  ### BACKEND API ###
  scaa-api:
    container_name: scaa-api
    image: ${DOCKER_REGISTRY-}scaaapi
    build:
      context: .
      dockerfile: SCAA-API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=SCAA_API;User Id=sa;Password=${SA_PASSWORD};MultipleActiveResultSets=true;TrustServerCertificate=true
      - JwtOptions__Secret=${JWT_SECRET}
      - JwtOptions__Issuer=${JWT_ISSUER}
      - JwtOptions__Audience=${JWT_AUDIENCE}
    ports:
      - "5021:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: always


  ### FRONTEND ###
  scaa-frontend:
    container_name: scaa-frontend
    build:
      context: ./SCAA-Frontend
      dockerfile: dockerfile
    ports:
      - "8081:80"
    depends_on:
      - scaa-api
    restart: always


volumes:
  sqlserver-data:
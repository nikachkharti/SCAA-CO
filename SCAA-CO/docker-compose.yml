services:
  scaa-api:
    container_name: scaa-api
    image: ${DOCKER_REGISTRY-}scaaapi
    build:
      context: .
      dockerfile: SCAA-API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=${SQL_CONNECTION_STRING}
      - JwtOptions__Secret=${JWT_SECRET}
      - JwtOptions__Issuer=${JWT_ISSUER}
      - JwtOptions__Audience=${JWT_AUDIENCE}
    ports:
      - "5021:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://${HOST}:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always